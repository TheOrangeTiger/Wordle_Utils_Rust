<!DOCTYPE html>
<html>
    <title>Wordle Solver</title>
    <h1>Wordle Solver</h1>
    <table>
        <tr>
            <td>On guess #</td>
            <td id="guess_number"></td>
        </tr>
        <tr>
            <td>Guess: </td>
            <td><input id="guess" value="crane"/></td>
        </tr>
        <tr>
            <td>Result: </td>
            <td><input id="result" /></td>
        </tr>
        <tr>
            <td><button id="process_guess">Process Guess</button></td>
        </tr>
        <tr>
            <td><button id="reset">Reset Wordle</button></td>
        </tr>
    </table>
    <p id="status"></p>
    <p>
        To use, the bot will reccomend a guess, which you can change. Then give it the result of inputing the guess into Wordle. grey = n, yellow = y, green = g
    </p>
    <script type="module">
        import init, {suggest_guess, get_words, lists_from_input_js, init_panic_hook} from './pkg/wordle_solver.js';
        await init();
        init_panic_hook();
        const wordlist = get_words();
        let bannedlets = "";
        let bannedatlets = ["", "", "", "", ""];
        let mustinclets = "";
        let incatlets = "#####";
        let guess_number = 1;
        document.getElementById("guess_number").textContent = guess_number;
        document.getElementById("process_guess").onclick = () => {
            const result = document.getElementById("result").value.toLowerCase();
            const validresult = result.split('').every(c => c === 'g' || c === 'y' || c === 'n');
            if (document.getElementById("guess").value.length == 5 && result.length == 5 && validresult) {
                document.getElementById("status").textContent = "";
                let lists_struct = lists_from_input_js(document.getElementById("guess").value.toLowerCase(), bannedlets, bannedatlets, mustinclets, incatlets, document.getElementById("result").value.toLowerCase());
                bannedlets = lists_struct.get_bannedlets();
                bannedatlets = lists_struct.get_bannedatlets();
                mustinclets = lists_struct.get_mustinclets();
                incatlets = lists_struct.get_incatlets();
                guess_number += 1;
                if (guess_number > 6 || result === "ggggg") {
                    document.getElementById("reset").click();
                    return;
                }
                document.getElementById("guess_number").textContent = guess_number;
                document.getElementById("guess").value = suggest_guess(wordlist, bannedlets, bannedatlets, mustinclets, incatlets);
                document.getElementById("result").value = "";
            } else {
                document.getElementById("status").textContent = "Invalid guess length, only inputs with the length of 5 and that are comprised of soley 'n's 'g's and 'y's are supported at the moment";
            }
        };
        document.getElementById("reset").onclick = () => {
            document.getElementById("status").textContent = "";
            document.getElementById("guess").value = "crane";
            bannedlets = "";
            bannedatlets = ["", "", "", "", ""];
            mustinclets = "";
            incatlets = "#####";
            guess_number = 1;
            document.getElementById("guess_number").textContent = guess_number;
        }
    </script>
</html>
